name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Resolve release target
        id: release_target
        run: |
          version="${GITHUB_REF#refs/tags/}"
          ref="${GITHUB_REF}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
            ref="refs/tags/${version}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.release_target.outputs.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew buildRelease

      - name: Create draft release
        uses: softprops/action-gh-release@v2.6.1
        with:
          draft: true
          tag_name: ${{ steps.release_target.outputs.version }}
          files: ./build/distributions/kafka-gitops.zip

      - name: Log in to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: |
            devshawn/kafka-gitops:${{ steps.release_target.outputs.version }}
            devshawn/kafka-gitops:latest
