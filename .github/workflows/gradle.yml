name: Java CI

on: push

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - broker_label: kafka39
            compose_file: docker/docker-compose.yml
          - broker_label: kafka40
            compose_file: docker/docker-compose.kafka4.yml
    runs-on: ubuntu-latest
    name: build (${{ matrix.broker_label }})

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Start docker compose for integration tests
        run: docker compose -f "${{ matrix.compose_file }}" up -d

      - name: Build with Gradle
        run: ./gradlew --info build

      - name: Upload build artifact
        if: matrix.broker_label == 'kafka40'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: kafka-gitops-${{ matrix.broker_label }}.jar
          path: build/libs/kafka-gitops-all.jar

      - name: Stop docker compose
        if: always()
        run: docker compose -f "${{ matrix.compose_file }}" down -v
