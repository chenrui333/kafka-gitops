x-kafka4-command: &kafka4-command
  - bash
  - -lc
  - |
    cat >/etc/kafka/kafka_server_jaas.conf <<'EOF'
    KafkaServer {
      org.apache.kafka.common.security.plain.PlainLoginModule required
      username="kafka"
      password="kafka-secret"
      user_test="test-secret"
      user_kafka="kafka-secret";
    };
    EOF
    /etc/confluent/docker/run

x-kafka4-environment: &kafka4-environment
  KAFKA_PROCESS_ROLES: "broker,controller"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:29093,2@kafka2:29093,3@kafka3:29093"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,LISTENER_DOCKER_INTERNAL:SASL_PLAINTEXT,LISTENER_DOCKER_EXTERNAL:SASL_PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "LISTENER_DOCKER_INTERNAL"
  KAFKA_SASL_ENABLED_MECHANISMS: "PLAIN"
  KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: "PLAIN"
  KAFKA_AUTHORIZER_CLASS_NAME: "org.apache.kafka.metadata.authorizer.StandardAuthorizer"
  KAFKA_SUPER_USERS: "User:test;User:kafka;User:ANONYMOUS"
  CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_DEFAULT_REPLICATION_FACTOR: 3
  KAFKA_MIN_INSYNC_REPLICAS: 2
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
  KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
  KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"

x-kafka4-service: &kafka4-service
  image: confluentinc/cp-kafka:8.0.0
  command: *kafka4-command
  environment:
    <<: *kafka4-environment

services:
  kafka1:
    <<: *kafka4-service
    hostname: kafka1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka4-environment
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: "LISTENER_DOCKER_INTERNAL://kafka1:19092,LISTENER_DOCKER_EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka1:29093"
      KAFKA_ADVERTISED_LISTENERS: "LISTENER_DOCKER_INTERNAL://kafka1:19092,LISTENER_DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092"

  kafka2:
    <<: *kafka4-service
    hostname: kafka2
    ports:
      - "9093:9093"
    environment:
      <<: *kafka4-environment
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: "LISTENER_DOCKER_INTERNAL://kafka2:19092,LISTENER_DOCKER_EXTERNAL://0.0.0.0:9093,CONTROLLER://kafka2:29093"
      KAFKA_ADVERTISED_LISTENERS: "LISTENER_DOCKER_INTERNAL://kafka2:19092,LISTENER_DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9093"

  kafka3:
    <<: *kafka4-service
    hostname: kafka3
    ports:
      - "9094:9094"
    environment:
      <<: *kafka4-environment
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: "LISTENER_DOCKER_INTERNAL://kafka3:19092,LISTENER_DOCKER_EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka3:29093"
      KAFKA_ADVERTISED_LISTENERS: "LISTENER_DOCKER_INTERNAL://kafka3:19092,LISTENER_DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9094"
